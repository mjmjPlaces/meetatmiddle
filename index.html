    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              coral: {
                50: "#fff3ee",
                100: "#ffe4d8",
                200: "#ffc5ac",
                400: "#ff8e6c",
                500: "#ff6f4f",
                600: "#e85a3b"
              }
            },
            boxShadow: {
              soft: "0 10px 28px rgba(255, 111, 79, 0.16)",
              softCard: "0 8px 20px rgba(31, 41, 55, 0.08)"
            }
          }
        }
      };
      window.__kakaoSdk = { loaded: false, errored: false, errorDetail: "" };
      window.__onKakaoSdkLoad = function () {
        window.__kakaoSdk.loaded = true;
      };
      window.__onKakaoSdkError = function () {
        window.__kakaoSdk.errored = true;
        window.__kakaoSdk.errorDetail =
          "브라우저가 Kakao SDK 스크립트를 로드하지 못했습니다(네트워크/광고차단/방화벽/도메인 설정). DevTools > Network에서 sdk.js 요청이 200인지 확인하세요.";
      };
    </script>
    <style>
      html,
      body {
        font-family: "NanumSquare", "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        background: radial-gradient(circle at 10% 0%, #ffece3 0, #fff8f4 36%), #fff9f6;
      }
      .app-fade {
        animation: fadeIn 0.34s ease both;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .tap-press {
        transition: transform 0.14s cubic-bezier(0.33, 1, 0.68, 1), box-shadow 0.14s ease;
      }
      .tap-press:active {
        transform: scale(0.97);
      }
      .resultSkeletonCard {
        border: 1px solid #ffd8c8;
        background: #fffdfb;
        border-radius: 18px;
        padding: 14px;
      }
      .resultSkeletonLine {
        height: 12px;
        border-radius: 999px;
        margin-top: 8px;
        background: linear-gradient(
          90deg,
          rgba(255, 111, 79, 0.14) 25%,
          rgba(255, 111, 79, 0.28) 50%,
          rgba(255, 111, 79, 0.14) 75%
        );
        background-size: 220% 100%;
        animation: skeletonShimmer 1.2s ease-in-out infinite;
      }
      .resultSkeletonDivider {
        height: 1px;
        margin: 12px 0 6px;
        background: rgba(255, 111, 79, 0.18);
      }
      @keyframes skeletonShimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -20% 0;
        }
      }
      /* fixed + translateX(-50%) 정렬 버튼: active에서 translate가 덮이면 좌우로 튀어 보임 */
      #stickyShare.tap-press:active {
        transform: translateX(-50%) scale(0.97);
      }
      .markerLabel {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        border: 1px solid rgba(0, 0, 0, 0.12);
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.95);
        color: #111;
        white-space: nowrap;
      }
      .markerDot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex: 0 0 auto;
      }
      /* 지도 위 추천 지점 요약(인포윈도우+이유 배지 통합) */
      .mapRecommendCard {
        position: relative;
        width: min(280px, calc(100vw - 48px));
        padding: 12px 14px 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.98);
        border: 1px solid rgba(255, 140, 110, 0.35);
        box-shadow: 0 10px 28px rgba(31, 41, 55, 0.14), 0 2px 8px rgba(255, 111, 79, 0.12);
        font-family: "NanumSquare", "Noto Sans KR", sans-serif;
        line-height: 1.35;
        text-align: left;
        transform: translate(
          var(--recommend-drag-x, 0px),
          calc(18px + var(--recommend-drag-y, 0px))
        );
        cursor: grab;
        user-select: none;
        touch-action: none;
        pointer-events: auto;
      }
      .mapRecommendConnector {
        position: absolute;
        left: 0;
        top: 14px;
        width: 42px;
        height: 0;
        border-top: 2px dashed rgba(255, 111, 79, 0.9);
        transform-origin: 0 0;
        pointer-events: none;
      }
      .mapRecommendCardRight .mapRecommendConnector {
        left: 0;
      }
      .mapRecommendCardLeft .mapRecommendConnector {
        left: 100%;
        right: -42px;
      }
      .mapRecommendCardDragging {
        cursor: grabbing;
      }
      .candidatePulseWrap {
        width: 42px;
        height: 42px;
        position: relative;
        transform: translate(-21px, -21px);
        pointer-events: none;
      }
      .candidatePulseCore {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 12px;
        height: 12px;
        margin-left: -6px;
        margin-top: -6px;
        border-radius: 999px;
        background: #ff6f4f;
        box-shadow: 0 0 0 3px rgba(255, 111, 79, 0.35);
      }
      .candidatePulseRing {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 14px;
        height: 14px;
        margin-left: -7px;
        margin-top: -7px;
        border-radius: 999px;
        border: 2px solid rgba(255, 111, 79, 0.65);
        animation: candidatePulse 1.9s ease-out infinite;
      }
      @keyframes candidatePulse {
        0% {
          transform: scale(1);
          opacity: 0.85;
        }
        100% {
          transform: scale(2.6);
          opacity: 0;
        }
      }
      .mapRecommendKicker {
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #ff6f4f;
        margin-bottom: 4px;
      }
      .mapRecommendTitle {
        font-size: 15px;
        font-weight: 800;
        color: #1e293b;
        letter-spacing: -0.02em;
        word-break: keep-all;
      }
      .mapRecommendAddr {
        margin-top: 6px;
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        line-height: 1.4;
        word-break: keep-all;
      }
      .mapRecommendDivider {
        margin: 10px 0 8px;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(255, 111, 79, 0.2),
          rgba(255, 111, 79, 0.06)
        );
      }
      .mapRecommendReasonRow {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .mapRecommendReasonDot {
        flex: 0 0 7px;
        width: 7px;
        height: 7px;
        margin-top: 5px;
        border-radius: 999px;
        background: linear-gradient(135deg, #ff8e6c, #ff6f4f);
        box-shadow: 0 0 0 2px rgba(255, 111, 79, 0.2);
      }
      .mapRecommendReasonText {
        font-size: 12px;
        font-weight: 700;
        color: #9a3412;
        line-height: 1.45;
        word-break: keep-all;
      }
      .friendTimeItem {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid #f6d7c8;
        background: #fffdfa;
        cursor: pointer;
      }
      .friendTimeItemSelected {
        border-color: #ffb899;
        box-shadow: 0 0 0 2px rgba(255, 111, 79, 0.15) inset;
      }
      .friendTimeLabel {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        flex: 1;
        min-width: 0;
        font-weight: 700;
        color: #1e293b;
      }
      .friendTimeMain {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .friendTimeLocation {
        margin-left: 8px;
        color: #111827;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .friendTimeBadge {
        color: #dc2626;
        font-weight: 800;
        flex: 0 0 auto;
        white-space: nowrap;
      }
      .friendTimeValue {
        font-size: 12px;
        color: #64748b;
        font-weight: 700;
      }
      #sheetBackdrop {
        position: fixed;
        inset: 0;
        display: none;
        background: rgba(17, 24, 39, 0.38);
        z-index: 70;
      }
      #sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: none;
        z-index: 110;
        pointer-events: none;
      }
      #sheet > div {
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: auto;
        pointer-events: auto;
      }
      #sheetBody {
        max-height: calc(min(72svh, 560px) - 88px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        padding-bottom: 18px;
      }
      @media (max-width: 720px) {
        input,
        select,
        button,
        textarea {
          font-size: 16px !important;
        }
      }
    </style>
    <script defer src="/src/main.js?v=20260425-07"></script>
  </head>
  <body class="min-h-screen text-slate-800">
    <div class="app-fade mx-auto w-full max-w-[480px] min-h-screen pb-28">
      <header class="px-4 pt-4 pb-2">
        <p class="text-[11px] font-extrabold uppercase tracking-[0.2em] text-coral-500">SameMeet</p>
        <h1 class="mt-0.5 text-[22px] font-extrabold tracking-tight text-slate-800">쌤밋 · 중간지점 찾기</h1>
        <p class="mt-1 text-[13px] text-slate-500">친구들과 딱 중간에서 만나기 ✨</p>
      </header>

      <section class="px-3">
        <div
          id="mapWrap"
          class="relative overflow-hidden rounded-3xl border border-coral-100 bg-white shadow-soft"
          style="height: min(52svh, 430px)"
        >
          <div id="map" class="h-full w-full"></div>
          <button
            id="locateBtn"
            type="button"
            class="tap-press absolute bottom-3 right-3 z-20 h-12 w-12 rounded-full border border-coral-200 bg-white text-xl shadow-softCard"
            aria-label="현재 위치로 이동"
            title="현재 위치로 이동"
          >
            📍
          </button>
        </div>
        <div id="mapStatus" class="mt-2 px-1 text-[12px] text-slate-500">지도 SDK 초기화 대기 중...</div>
      </section>

      <section
        class="-mt-4 rounded-t-[28px] border-t border-coral-100 bg-[#fffaf7] px-3 pt-4 app-fade"
        style="box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.08)"
      >
        <div id="searchPanel" class="rounded-3xl border border-coral-100 bg-white p-3 shadow-softCard">
          <div id="friends" class="space-y-2"></div>
          <button
            id="addFriend"
            type="button"
            class="tap-press mt-2 h-12 w-full rounded-2xl border border-coral-200 bg-coral-50 font-bold text-coral-600"
          >
            + 친구 추가
          </button>

          <div class="mt-3">
            <button
              id="run"
              type="button"
              class="tap-press h-12 w-full rounded-2xl bg-coral-500 px-5 font-extrabold text-white shadow-soft active:bg-coral-600"
            >
              중간지점 계산
            </button>
          </div>
        </div>

        <button
          id="backToSearch"
          type="button"
          class="tap-press mt-3 hidden h-11 w-full rounded-2xl border border-coral-200 bg-white px-4 text-sm font-bold text-coral-600"
        >
          ← 입력 화면으로 돌아가기
        </button>

        <div id="cards" class="mt-3 space-y-2"></div>
        <div id="result" class="mt-2 px-1 text-[13px] text-slate-600"></div>
      </section>
    </div>

    <button
      id="stickyShare"
      type="button"
      class="tap-press fixed bottom-3 left-1/2 z-[90] hidden h-12 w-[min(456px,calc(100vw-20px))] -translate-x-1/2 rounded-2xl border border-yellow-300 bg-[#FEE500] px-4 font-extrabold text-[#3C1E1E] shadow-softCard"
      style="padding-bottom: max(0px, env(safe-area-inset-bottom, 0px))"
    >
      카톡으로 결과 공유하기
    </button>

    <div id="sheetBackdrop"></div>
    <div id="sheet" role="dialog" aria-modal="true" aria-label="경로 상세">
      <div
        class="mx-auto h-[min(72svh,560px)] w-full max-w-[480px] overflow-hidden rounded-t-[28px] border border-coral-100 bg-white p-4 pb-[max(12px,env(safe-area-inset-bottom,0px))] shadow-[0_-12px_30px_rgba(0,0,0,0.2)]"
      >
        <div id="sheetHeader" class="flex items-center justify-between gap-3 border-b border-coral-100 pb-3">
          <div>
            <div id="sheetTitle" class="text-base font-extrabold">상세 경로</div>
            <div id="sheetSubtitle" class="mt-1 text-xs text-slate-500"></div>
          </div>
          <button
            id="sheetClose"
            type="button"
            class="tap-press h-11 rounded-2xl border border-coral-200 bg-coral-50 px-4 text-sm font-bold text-coral-600"
          >
            닫기
          </button>
        </div>

        <div id="sheetBody" class="pt-3">
          <div class="text-xs font-semibold text-slate-500">전체 친구 소요시간</div>
          <div id="friendTimeList" class="mt-2 grid gap-2"></div>
          <ul id="pathList" class="mt-3 list-disc pl-5 text-sm text-slate-700"></ul>
        </div>
      </div>
    </div>
  </body>
</html>
