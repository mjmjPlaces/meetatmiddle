<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fffaf7" />
    <title>중간지점 찾기</title>
    <script>
      window.__kakaoSdk = { loaded: false, errored: false, errorDetail: "" };
      window.__onKakaoSdkLoad = function () {
        window.__kakaoSdk.loaded = true;
      };
      window.__onKakaoSdkError = function () {
        window.__kakaoSdk.errored = true;
        window.__kakaoSdk.errorDetail =
          "브라우저가 Kakao SDK 스크립트를 로드하지 못했습니다(네트워크/광고차단/방화벽/도메인 설정). DevTools > Network에서 sdk.js 요청이 200인지 확인하세요.";
      };
    </script>
    <script defer src="./src/main.js"></script>
    <style>
      :root {
        --bg: #fffaf7;
        --surface: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #f0d7ca;
        --primary: #ff6f4f;
        --primary-strong: #e85a3b;
        --shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
      }
      * { box-sizing: border-box; }
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      body {
        margin: 0;
        font-family: "Pretendard", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 10%, #ffe7dc 0, #fffaf7 35%),
          radial-gradient(circle at 92% 0, #ffece3 0, #fffaf7 26%),
          var(--bg);
        overflow-x: hidden;
      }
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 16px 12px;
        padding-bottom: max(24px, env(safe-area-inset-bottom, 0px));
      }
      .inputPanel {
        max-width: 760px;
        margin: 0 auto;
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      .row { display: flex; gap: 10px; margin-bottom: 10px; align-items: stretch; }
      /* 친구 이름 + 주소: 데스크톱 가로, 모바일 세로 */
      #friends .row.friendRow { align-items: center; }
      #friends .row.friendRow .name {
        flex: 0 0 7.5rem;
        min-width: 0;
      }
      #friends .row.friendRow .address {
        flex: 1 1 auto;
        min-width: 0;
        width: 100%;
      }
      .row.modeRow { flex-wrap: wrap; }
      .row.modeRow select { flex: 1 1 160px; min-width: 0; }
      .row.modeRow #run { flex: 1 1 140px; min-height: 48px; }
      input, select, button {
        border-radius: 12px;
        border: 1px solid #ebd2c5;
        font-size: 14px;
      }
      input, select {
        padding: 10px 12px;
        background: #fffdfb;
        color: var(--text);
      }
      input:focus, select:focus, button:focus {
        outline: 2px solid rgba(255, 111, 79, 0.2);
        outline-offset: 1px;
      }
      .btnAccent {
        padding: 12px 16px;
        border: 1px solid var(--primary);
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        cursor: pointer;
        min-height: 48px;
        touch-action: manipulation;
      }
      .btnAccent:hover { background: var(--primary-strong); border-color: var(--primary-strong); }
      .btnGhost {
        padding: 12px 16px;
        background: #fff;
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        min-height: 48px;
        touch-action: manipulation;
      }
      .btnPrimary {
        padding: 12px 14px;
        border: 1px solid var(--primary);
        background: #fff7f2;
        border-radius: 10px;
        color: #b7442a;
        font-weight: 700;
        cursor: pointer;
        min-height: 44px;
        touch-action: manipulation;
      }
      #mapWrap {
        margin-top: 14px;
        padding: 10px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--surface);
        box-shadow: var(--shadow);
      }
      #map {
        width: 100%;
        height: min(74vh, 760px);
        border: 1px solid var(--line);
        border-radius: 14px;
        touch-action: pan-x pan-y pinch-zoom;
      }
      #mapStatus { margin-top: 8px; color: var(--muted); font-size: 13px; }
      #cards { margin-top: 10px; }
      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        background: #ffffff;
      }
      .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .friendRow {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-top: 7px;
        font-size: 13px;
        color: #374151;
      }
      .friendName { font-weight: 700; }
      .friendTime { color: #111827; }
      .cardActions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      .cardActions .btnPrimary { flex: 1 1 calc(50% - 4px); min-width: 140px; }
      #result { margin-top: 10px; color: #333; }

      /* Bottom sheet */
      #sheetBackdrop {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        display: none;
        z-index: 10000;
      }
      #sheet {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
        box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
        display: none;
        max-height: 85vh;
        overflow: auto;
        z-index: 10001;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      #sheetHeader {
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      #sheetTitle { font-weight: 700; }
      #sheetClose { border: 1px solid #ccc; background: #fff; border-radius: 10px; padding: 10px 14px; cursor: pointer; min-height: 44px; touch-action: manipulation; }
      #sheetBody { padding: 12px 14px; }
      #friendSelect { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
      #pathList { margin: 10px 0 0; padding-left: 18px; color: #333; font-size: 14px; }
      #pathList li { margin: 4px 0; }
      #friendTimeList {
        display: grid;
        gap: 6px;
        margin-top: 8px;
        margin-bottom: 12px;
      }
      .friendTimeItem {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid #f0d7ca;
        background: #fffaf7;
        font-size: 13px;
      }
      .friendTimeLabel { font-weight: 700; color: #374151; }
      .friendTimeValue { color: #111827; }
      .friendTimeItemLongest {
        border-color: #ffb9a7;
        background: #fff1ec;
      }
      .friendTimeBadge {
        margin-left: 6px;
        display: inline-block;
        padding: 2px 6px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        color: #9e3d27;
        background: #ffd8cc;
        border: 1px solid #ffb9a7;
        vertical-align: middle;
      }
      #result { margin-top: 10px; color: #333; }

      /* Map overlay labels */
      .markerLabel {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        border: 1px solid rgba(0,0,0,0.12);
        box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        background: rgba(255,255,255,0.95);
        color: #111;
        white-space: nowrap;
      }
      .markerDot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        flex: 0 0 auto;
      }
      .reasonBadge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(255, 111, 79, 0.45);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        color: #9e3d27;
        font-size: 12px;
        font-weight: 800;
        white-space: nowrap;
      }
      .reasonDot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: var(--primary);
        flex: 0 0 auto;
      }

      @media (max-width: 720px) {
        .container { padding-left: max(12px, env(safe-area-inset-left)); padding-right: max(12px, env(safe-area-inset-right)); }
        .inputPanel { padding: 14px 12px; border-radius: 16px; }
        #friends .row.friendRow {
          flex-direction: column;
          align-items: stretch;
        }
        #friends .row.friendRow .name {
          flex: none;
          width: 100%;
        }
        .row.modeRow {
          flex-direction: column;
        }
        .row.modeRow select,
        .row.modeRow #run {
          width: 100%;
          flex: none;
        }
        /* iOS: 입력 포커스 시 자동 확대 방지 */
        input, select, button, textarea {
          font-size: 16px;
        }
        #mapWrap { padding: 8px; margin-top: 12px; }
        #map {
          height: min(48vh, 360px);
          min-height: 200px;
        }
        @supports (height: 1svh) {
          #map { height: min(48svh, 360px); }
        }
        #mapStatus { font-size: 12px; line-height: 1.4; }
        .card { padding: 14px 12px; }
        .cardActions .btnPrimary {
          flex: 1 1 100%;
          min-width: 0;
        }
        #addFriend {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="inputPanel">
        <div id="friends"></div>
        <button id="addFriend" class="btnGhost" type="button">친구 추가</button>
        <div class="row modeRow" style="margin-top:10px; margin-bottom:0;">
          <select id="mode" aria-label="점수 모드">
            <option value="balanced">균등(공정)</option>
            <option value="majority">비균등(다수 최적)</option>
          </select>
          <button id="run" class="btnAccent" type="button">중간지점 계산</button>
        </div>
      </section>

      <section id="mapWrap">
        <div id="map"></div>
        <div id="mapStatus">지도 SDK 초기화 대기 중...</div>
        <div id="cards"></div>
        <div id="result"></div>
      </section>
    </div>

    <div id="sheetBackdrop"></div>
    <div id="sheet" role="dialog" aria-modal="true" aria-label="경로 상세">
      <div id="sheetHeader">
        <div>
          <div id="sheetTitle">상세 경로</div>
          <div id="sheetSubtitle" class="meta"></div>
        </div>
        <button id="sheetClose" type="button">닫기</button>
      </div>
      <div id="sheetBody">
        <div class="meta">전체 친구 소요시간</div>
        <div id="friendTimeList"></div>
        <div class="meta" style="margin-bottom:8px;">친구 선택 후 상세 경로</div>
        <select id="friendSelect"></select>
        <ul id="pathList"></ul>
      </div>
    </div>
  </body>
</html>
